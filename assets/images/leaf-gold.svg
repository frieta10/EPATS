  <!-- Small leaf right -->
  <path d="M54,140 Q68,125 78,118 Q68,132 54,140Z" fill="url(#lg)" opacity="0.55"/>
  <!-- Small leaf left -->
  <path d="M55,155 Q42,143 34,138 Q44,146 55,155Z" fill="url(#lg)" opacity="0.5"/>
  <!-- Tiny berries -->
  <circle cx="10" cy="10" r="4" fill="#C9A84C" opacity="0.7"/>
  <circle cx="75" cy="15" r="3" fill="#C9A84C" opacity="0.6"/>
  <circle cx="85" cy="65" r="2.5" fill="#C9A84C" opacity="0.55"/>
